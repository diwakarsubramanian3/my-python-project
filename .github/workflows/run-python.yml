name: Todo App (Manual Run)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action: add / show / edit / exit"
        required: true
        default: "show"
      todo_text:
        description: "Todo text (used for add/edit)"
        required: false
        default: "Sample task"
      todo_number:
        description: "Todo number (used for edit)"
        required: false
        default: "1"

jobs:
  run-todo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Todo Script
        run: |
          echo "Running action: ${{ github.event.inputs.action }}"

          if [ "${{ github.event.inputs.action }}" = "add" ]; then
            echo -e "add\n${{ github.event.inputs.todo_text }}\nshow\nexit" | python hello.py

          elif [ "${{ github.event.inputs.action }}" = "edit" ]; then
            echo -e "add\nTask 1\nadd\nTask 2\nedit\n${{ github.event.inputs.todo_number }}\n${{ github.event.inputs.todo_text }}\nshow\nexit" | python hello.py

          elif [ "${{ github.event.inputs.action }}" = "show" ]; then
            echo -e "add\nTask 1\nadd\nTask 2\nshow\nexit" | python your_script.py

          else
            echo -e "exit" | python hello.py
          fi
